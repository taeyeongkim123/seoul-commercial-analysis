version: 2

models:
  - name: mart_district_sales_trend
    columns:
      - name: district_code
        tests: [not_null]
      - name: industry_code
        tests: [not_null]
      - name: monthly_sales_amount
        tests: [not_null]

  - name: mart_industry_competition
    columns:
      - name: district_code
        tests: [not_null]
      - name: industry_code
        tests: [not_null]
      - name: store_count
        tests: [not_null]

  - name: mart_district_risk
    columns:
      - name: district_code
        tests: [not_null]
      - name: change_index_code
        tests:
          - accepted_values:
              arguments:
                values: ["LL", "LH", "HL", "HH"]
      - name: heuristic_risk_flag
        tests:
          - accepted_values:
              arguments:
                values: ["watch", "normal"]

  - name: mart_district_map
    columns:
      - name: district_code
        tests: [not_null, unique]
      - name: lon
        tests: [not_null]
      - name: lat
        tests: [not_null]
